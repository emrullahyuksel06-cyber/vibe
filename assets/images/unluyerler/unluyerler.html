<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoQuiz - Global Challenge</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #ffffff;
            --primary-color: #ffffff; 
            --accent-color: #e74c3c;
            --success-color: #2ecc71;
            --warning-color: #f1c40f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Dinamik Sayfa Kaplayan Netleştirilmiş Arka Plan */
        .bg-blur-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            filter: blur(3px); /* Blur azaltıldı, görsel artık net ve anlaşılır */
            opacity: 0.4; /* Görselin detaylarını öne çıkarmak için opaklık optimize edildi */
            z-index: -1;
            transition: background-image 0.5s ease-in-out;
        }

        /* Beyaz alanları kaldırılmış transparan oyun alanı */
        .game-container {
            background-color: transparent; /* Beyaz blok tamamen kaldırıldı */
            width: 100%;
            max-width: 500px;
            padding: 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        /* Giriş Ekranı */
        #start-screen {
            background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.6)), url('girs.webp');
            background-size: cover;
            background-position: center;
            border-radius: 16px;
            padding: 40px 20px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .lang-select-container {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        .lang-dropdown {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border: 2px solid white;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }

        .lang-dropdown option {
            color: #2c3e50;
            background: white;
        }

        .start-btn {
            background-color: var(--success-color);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
            transition: transform 0.2s;
        }

        .start-btn:hover {
            transform: scale(1.05);
        }

        /* Süre Barı */
        .timer-container {
            width: 100%;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            margin: 15px 0;
            overflow: hidden;
        }

        .timer-bar {
            width: 100%;
            height: 100%;
            background-color: var(--success-color);
            transition: width 0.1s linear, background-color 0.5s;
        }

        /* Görsel Alanı */
        .image-container {
            width: auto;
            max-width: 100%;
            height: auto;
            max-height: 45vh; 
            aspect-ratio: 9 / 16; 
            margin: 0 auto 15px auto;
            border-radius: 16px;
            overflow: hidden;
            background-color: transparent; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 9:16 modunda tam ekran hissi için optimize edildi */
        }

        .landmark-name {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 15px;
            min-height: 26px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8); /* Arka planda net okunma sağlamak için gölge */
        }

        .top-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 15px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* Seçenekler Grid (Yarı Şeffaf Minimal Tasarım) */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .btn {
            background-color: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #ffffff;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .btn:hover:not(:disabled) {
            border-color: #ffffff;
            background-color: rgba(255, 255, 255, 0.3);
        }

        .correct {
            background-color: var(--success-color) !important;
            color: white !important;
            border-color: var(--success-color) !important;
            text-shadow: none;
        }

        .wrong {
            background-color: var(--accent-color) !important;
            color: white !important;
            border-color: var(--accent-color) !important;
            text-shadow: none;
        }

        #result-message {
            font-size: 16px;
            font-weight: bold;
            min-height: 24px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .action-btn {
            background-color: var(--success-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin: 8px;
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3);
            transition: background-color 0.2s;
        }
        
        .vibe-btn {
            background-color: #9b59b6;
            box-shadow: 0 4px 10px rgba(155, 89, 182, 0.3);
        }

        .next-lvl-btn {
            background-color: #3498db;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
        }

        /* Mobil Ekran Uyumluluğu */
        @media (max-width: 480px) {
            .options-grid {
                grid-template-columns: 1fr; 
            }
            .image-container {
                max-height: 40vh; 
            }
        }
    </style>
</head>

        <div class="lang-select-container">
            <select class="lang-dropdown" id="lang-menu" onchange="setLanguage(this.value)">

                <option value="en">English (EN)</option>

        <div>
            <button class="start-btn" id="start-action" onclick="startGame()">BAŞLA</button>
        </div>
    </div>

    <div id="main-game" style="display: none;">
        <div class="top-meta">
            <span id="level-counter">Seviye: 1</span>
            <span id="question-counter">1 / 14</span>
        </div>

        <div class="timer-container">
            <div class="timer-bar" id="t-bar"></div>
        </div>

        <div class="image-container">
            <img id="city-image" src="" alt="Geoguessr Visual">
        </div>
        <div class="landmark-name" id="landmark-title"></div>
        
        <div class="options-grid" id="options-box"></div>
        <div id="result-message"></div>
    </div>
</div>

    ];

    let currentLang = 'tr';
    let currentLevel = 1;
    let mevcutSoruIndex = 0;
    let tiklanabilir = true;
    let dogruSayisi = 0;
    let yanlisSayisi = 0;
    let bosSayisi = 0; 
    let timerInterval;
    let remainingTime = 70; 
    let sorular = seviye1_sorulari;

    const audioCorrect = new Audio('correct.mp3');
    const audioWrong = new Audio('wrong.mp3');

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const langParam = urlParams.get('lang');
        if (langParam && STRINGS[langParam]) {
            currentLang = langParam;
            document.getElementById("lang-menu").value = currentLang;
        }
        setLanguage(currentLang);
    };

    function setLanguage(lang) {
        currentLang = lang;
        document.getElementById("welcome-title").innerText = STRINGS[currentLang].title;
        document.getElementById("welcome-sub").innerText = STRINGS[currentLang].sub;
        document.getElementById("start-action").innerText = STRINGS[currentLang].start;
    }

    function startGame() {
        document.getElementById("start-screen").style.display = "none";
        document.getElementById("main-game").style.display = "block";
        sorular = currentLevel === 1 ? seviye1_sorulari : seviye2_sorulari;
        soruYukle();
    }

    function startTimer() {
        clearInterval(timerInterval);
        remainingTime = 70;
        const bar = document.getElementById("t-bar");
        bar.style.width = "100%";
        bar.style.backgroundColor = "var(--success-color)";

        timerInterval = setInterval(() => {
            if (!tiklanabilir) {
                clearInterval(timerInterval);
                return;
            }
            remainingTime--;
            bar.style.width = (remainingTime * 10 / 7) + "%";
            if (remainingTime <= 30) bar.style.backgroundColor = "var(--accent-color)";

            if (remainingTime <= 0) {
                clearInterval(timerInterval);
                süreDolduMekanizmasi();
            }
        }, 100);
    }

    function soruYukle() {
        const totalQuestions = sorular.length;
        document.getElementById("level-counter").innerText = `${STRINGS[currentLang].lvl}: ${currentLevel}`;
        
        if (mevcutSoruIndex >= totalQuestions) {
            oyunBittiPaneli();
            return;
        }

        tiklanabilir = true;
        document.getElementById("result-message").innerText = "";
        const cBox = document.getElementById("options-box");
        cBox.innerHTML = "";
        
        document.getElementById("question-counter").innerText = `${mevcutSoruIndex + 1} / ${totalQuestions}`;

        const mevcutSoru = sorular[mevcutSoruIndex];
        
        document.getElementById("city-image").src = mevcutSoru.gorsel;
        document.getElementById("dynamic-bg").style.backgroundImage = `url('${mevcutSoru.gorsel}')`;
        
        document.getElementById("landmark-title").innerText = mevcutSoru.eser[currentLang] || mevcutSoru.eser['en'];

        const secenekListesi = mevcutSoru.secenekler[currentLang] || mevcutSoru.secenekler['en'];
        const doğruCevap = mevcutSoru.dogru[currentLang] || mevcutSoru.dogru['en'];

        secenekListesi.forEach(secenek => {
            const buton = document.createElement("button");
            buton.innerText = secenek;
            buton.classList.add("btn");
            buton.onclick = () => cevapKontrol(buton, secenek, doğruCevap);
            cBox.appendChild(buton);
        });

        startTimer();
    }

    function cevapKontrol(buton, secilen, dogruCevap) {
        if (!tiklanabilir) return;
        tiklanabilir = false;
        clearInterval(timerInterval);

        if (secilen === dogruCevap) {
            dogruSayisi++;
            try { audioCorrect.play(); } catch(e){}
            buton.classList.add("correct");
            document.getElementById("result-message").innerText = STRINGS[currentLang].correctMsg;
            document.getElementById("result-message").style.color = "var(--success-color)";
        } else {
            yanlisSayisi++;
            try { audioWrong.play(); } catch(e){}
            buton.classList.add("wrong");
            document.getElementById("result-message").innerText = STRINGS[currentLang].wrongMsg;
            document.getElementById("result-message").style.color = "var(--accent-color)";
            highlightCorrect(dogruCevap);
        }
        nextQuestionDelay();
    }

    function süreDolduMekanizmasi() {
        tiklanabilir = false;
        bosSayisi++; 
        try { audioWrong.play(); } catch(e){}
        document.getElementById("result-message").innerText = STRINGS[currentLang].timeOutMsg;
        document.getElementById("result-message").style.color = "var(--warning-color)";
        
        const dogruCevap = sorular[mevcutSoruIndex].dogru[currentLang] || sorular[mevcutSoruIndex].dogru['en'];
        highlightCorrect(dogruCevap);
        nextQuestionDelay();
    }

    function highlightCorrect(dogruCevap) {
        const butonlar = document.getElementById("options-box").children;
        Array.from(butonlar).forEach(b => {
            if (b.innerText === dogruCevap) b.classList.add("correct");
        });
    }

    function nextQuestionDelay() {
        setTimeout(() => {
            mevcutSoruIndex++;
            soruYukle();
        }, 1500);
    }

    function exitToVibe() {
        window.location.href = `vibe://back-to-app?correct=${dogruSayisi}&wrong=${yanlisSayisi}&empty=${bosSayisi}`; 
    }

    function seviyeDegistir() {
        currentLevel = 2;
        mevcutSoruIndex = 0;
        dogruSayisi = 0;
        yanlisSayisi = 0;
        bosSayisi = 0;
        sorular = seviye2_sorulari;
        
        document.getElementById("question-counter").style.display = "block";
        document.getElementById("t-bar").parentElement.style.display = "block";
        document.getElementById("city-image").parentElement.style.display = "flex";
        soruYukle();
    }

    function oyunBittiPaneli() {
        document.getElementById("question-counter").style.display = "none";
        document.getElementById("t-bar").parentElement.style.display = "none";
        document.getElementById("city-image").parentElement.style.display = "none";
        
        document.getElementById("dynamic-bg").style.backgroundImage = "none";

        document.getElementById("landmark-title").innerText = STRINGS[currentLang].ended;
        document.getElementById("options-box").innerHTML = "";
        
        let extraButtons = "";
        
        if (currentLevel === 1) {
            if (dogruSayisi >= 8) {
                extraButtons = `<button class="action-btn next-lvl-btn" onclick="seviyeDegistir()">${STRINGS[currentLang].nextLvl}</button>`;
            } else {
                extraButtons = `<p style="color: var(--accent-color); font-size:14px; font-weight:bold;">⚠️ ${STRINGS[currentLang].lvlFail}</p>`;
            }
        }
        
        document.getElementById("result-message").innerHTML = `
            <p style="color: var(--text-color); font-size:16px;">${STRINGS[currentLang].score}</p>
            <p style="color: var(--success-color); font-size:18px; font-weight:bold;">✅ ${STRINGS[currentLang].correct}: ${dogruSayisi}</p>
            <p style="color: var(--accent-color); font-size:18px; font-weight:bold;">❌ ${STRINGS[currentLang].wrong}: ${yanlisSayisi}</p>
            <p style="color: var(--warning-color); font-size:18px; font-weight:bold;">🟡 ${STRINGS[currentLang].empty}: ${bosSayisi}</p>
            <hr style="border: 0; height: 1px; background: rgba(255,255,255,0.2); margin: 20px 0;">
            
            ${extraButtons}
            <button class="action-btn" onclick="oyunuYenidenBaslat()">${STRINGS[currentLang].restart}</button>
            <button class="action-btn vibe-btn" onclick="exitToVibe()">${STRINGS[currentLang].returnVibe}</button>
        `;
    }

    function oyunuYenidenBaslat() {
        mevcutSoruIndex = 0; dogruSayisi = 0; yanlisSayisi = 0; bosSayisi = 0;
        if (currentLevel === 2) {
            currentLevel = 1;
            sorular = seviye1_sorulari;
        }
        document.getElementById("question-counter").style.display = "block";
        document.getElementById("t-bar").parentElement.style.display = "block";
        document.getElementById("city-image").parentElement.style.display = "flex";
        soruYukle();
    }
</script>
