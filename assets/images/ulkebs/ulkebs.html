<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoQuiz - Ülke & Başkent Challenge</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #ffffff;
            --primary-color: #ffffff; 
            --accent-color: #e74c3c;
            --success-color: #2ecc71;
            --warning-color: #f1c40f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        .bg-blur-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            filter: blur(3px);
            opacity: 0.4;
            z-index: -1;
            transition: background-image 0.5s ease-in-out;
        }

        .game-container {
            background-color: transparent;
            width: 100%;
            max-width: 500px;
            padding: 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        #start-screen {
            background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.6)), url('girs.webp');
            background-size: cover;
            background-position: center;
            border-radius: 16px;
            padding: 40px 20px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .lang-select-container {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        .lang-dropdown {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border: 2px solid white;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }

        .lang-dropdown option {
            color: #2c3e50;
            background: white;
        }

        .start-btn {
            background-color: var(--success-color);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
            transition: transform 0.2s;
        }

        .start-btn:hover {
            transform: scale(1.05);
        }

        .timer-container {
            width: 100%;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            margin: 15px 0;
            overflow: hidden;
        }

        .timer-bar {
            width: 100%;
            height: 100%;
            background-color: var(--success-color);
            transition: width 0.1s linear, background-color 0.5s;
        }

        .image-container {
            width: auto;
            max-width: 100%;
            height: auto;
            max-height: 45vh; 
            aspect-ratio: 9 / 16; 
            margin: 0 auto 15px auto;
            border-radius: 16px;
            overflow: hidden;
            background-color: transparent; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .landmark-space {
            min-height: 26px;
            margin-bottom: 15px;
        }

        .top-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 15px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }

        .btn {
            background-color: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #ffffff;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            width: 100%;
            box-sizing: border-box;
        }

        .btn:hover:not(:disabled) {
            border-color: #ffffff;
            background-color: rgba(255, 255, 255, 0.3);
        }

        .correct {
            background-color: var(--success-color) !important;
            color: white !important;
            border-color: var(--success-color) !important;
            text-shadow: none;
        }

        .wrong {
            background-color: var(--accent-color) !important;
            color: white !important;
            border-color: var(--accent-color) !important;
            text-shadow: none;
        }

        #result-message {
            font-size: 16px;
            font-weight: bold;
            min-height: 24px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .action-btn {
            background-color: var(--success-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin: 8px;
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3);
            transition: background-color 0.2s;
        }
        
        .vibe-btn {
            background-color: #9b59b6;
            box-shadow: 0 4px 10px rgba(155, 89, 182, 0.3);
        }

        .next-lvl-btn {
            background-color: #3498db;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
        }

        .results-layout {
            grid-column: span 2;
        }
    </style>
</head>

        </div>
        
        <div class="landmark-space"></div>

    ];

    let mevcutSeviye = 1;
    let aktifSoruListesi = [];
    let mevcutSoruIndex = 0;
    
    let dogruSayisi = 0;
    let yanlisSayisi = 0;
    let bosSayisi = 0;
    
    let kalanSure = 7;
    let zamanlayici = null;
    let secimYapildi = false;
    let secilenDil = "TT";

    function setLanguage(lang) {
        secilenDil = lang;
        const UI = STRINGS[secilenDil] || STRINGS["TT"];
        document.getElementById("welcome-title").textContent = UI.title;
        document.getElementById("welcome-sub").textContent = UI.sub;
        document.getElementById("start-action").textContent = UI.start;
    }

    function initLevel(lvl) {
        mevcutSeviye = lvl;
        mevcutSoruIndex = 0;
        dogruSayisi = 0;
        yanlisSayisi = 0;
        bosSayisi = 0;
        
        if (lvl === 1) aktifSoruListesi = seviye1_sorulari;
        else if (lvl === 2) aktifSoruListesi = seviye2_sorulari;
        else if (lvl === 3) aktifSoruListesi = seviye3_sorulari;

        const UI = STRINGS[secilenDil] || STRINGS["TT"];
        document.getElementById("level-counter").textContent = `${UI.lvl}: ${mevcutSeviye}`;
    }

    function startGame() {
        document.getElementById("start-screen").style.display = "none";
        document.getElementById("main-game").style.display = "block";
        initLevel(1);
        soruYukle();
    }

    function soruYukle() {
        if (mevcutSoruIndex >= aktifSoruListesi.length) {
            seviyeBittiEkrani();
            return;
        }

        secimYapildi = false;
        document.getElementById("result-message").textContent = "";
        document.getElementById("question-counter").textContent = `${mevcutSoruIndex + 1} / ${aktifSoruListesi.length}`;

        const soru = aktifSoruListesi[mevcutSoruIndex];
        
        document.getElementById("city-image").src = soru.gorsel;
        document.getElementById("dynamic-bg").style.backgroundImage = `url('${soru.gorsel}')`;

        const optionsBox = document.getElementById("options-box");
        optionsBox.innerHTML = "";

        // Seçilen dil soruda varsa o dili, yoksa alternatif olarak İngilizceyi yükler
        const soruDili = soru.secenekler[secilenDil] ? secilenDil : "EN";
        
        const guncelSecenekler = soru.secenekler[soruDili];
        
        // Doğru cevabın indeksini bulup seçilen dildeki karşılığını eşleştiriyoruz
        const dogruIndex = soru.secenekler["TT"].indexOf(soru.dogru);
        const guncelDogruCevap = guncelSecenekler[dogruIndex !== -1 ? dogruIndex : 0];

        guncelSecenekler.forEach(secenek => {
            const btn = document.createElement("button");
            btn.className = "btn";
            btn.textContent = secenek;
            btn.onclick = () => cevapKontrol(secenek, guncelDogruCevap, btn);
            optionsBox.appendChild(btn);
        });

        sureyiBaslat();
    }

    function sureyiBaslat() {
        clearInterval(zamanlayici);
        kalanSure = 7;
        const bar = document.getElementById("t-bar");
        bar.style.width = "100%";
        bar.style.backgroundColor = "var(--success-color)";

        zamanlayici = setInterval(() => {
            kalanSure -= 0.1;
            const yuzde = (kalanSure / 7) * 100;
            bar.style.width = `${yuzde}%`;

            if (kalanSure <= 3) {
                bar.style.backgroundColor = "var(--accent-color)";
            } else if (kalanSure <= 5) {
                bar.style.backgroundColor = "var(--warning-color)";
            }

            if (kalanSure <= 0) {
                clearInterval(zamanlayici);
                sureDoldu();
            }
        }, 100);
    }

    function cevapKontrol(secilenCevap, dogruCevap, buton) {
        if (secimYapildi) return;
        secimYapildi = true;
        clearInterval(zamanlayici);

        const buttons = document.querySelectorAll("#options-box .btn");
        const UI = STRINGS[secilenDil] || STRINGS["TT"];

        if (secilenCevap === dogruCevap) {
            buton.classList.add("correct");
            document.getElementById("result-message").textContent = UI.correctMsg;
            document.getElementById("result-message").style.color = "var(--success-color)";
            dogruSayisi++;
        } else {
            buton.classList.add("wrong");
            document.getElementById("result-message").textContent = UI.wrongMsg;
            document.getElementById("result-message").style.color = "var(--accent-color)";
            yanlisSayisi++;
            
            buttons.forEach(b => {
                if (b.textContent === dogruCevap) b.classList.add("correct");
            });
        }

        buttons.forEach(b => b.disabled = true);
        setTimeout(() => { mevcutSoruIndex++; soruYukle(); }, 2000);
    }

    function sureDoldu() {
        if (secimYapildi) return;
        secimYapildi = true;
        bosSayisi++;

        const soru = aktifSoruListesi[mevcutSoruIndex];
        const soruDili = soru.secenekler[secilenDil] ? secilenDil : "EN";
        const dogruIndex = soru.secenekler["TT"].indexOf(soru.dogru);
        const guncelDogruCevap = soru.secenekler[soruDili][dogruIndex !== -1 ? dogruIndex : 0];
        const buttons = document.querySelectorAll("#options-box .btn");
        const UI = STRINGS[secilenDil] || STRINGS["TT"];

        document.getElementById("result-message").textContent = UI.timeOutMsg;
        document.getElementById("result-message").style.color = "var(--warning-color)";

        buttons.forEach(b => {
            if (b.textContent === guncelDogruCevap) b.classList.add("correct");
            b.disabled = true;
        });

        setTimeout(() => { mevcutSoruIndex++; soruYukle(); }, 2000);
    }

    function seviyeBittiEkrani() {
        clearInterval(zamanlayici);
        document.getElementById("result-message").textContent = "";
        
        const optionsBox = document.getElementById("options-box");
        const UI = STRINGS[secilenDil] || STRINGS["TT"];

        optionsBox.innerHTML = `
            <div class="results-layout" style="font-size: 16px; margin-bottom: 20px; text-align: left; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 12px; line-height: 1.6;">
                <strong>${UI.score}</strong><br>
                ✅ ${UI.correct}: ${dogruSayisi}<br>
                ❌ ${UI.wrong}: ${yanlisSayisi}<br>
                ⚪ ${UI.empty}: ${bosSayisi}
            </div>
        `;

        let actionWrapper = document.createElement("div");
        actionWrapper.className = "results-layout";

        if (mevcutSeviye === 1) {
            if (dogruSayisi >= 8) {
                actionWrapper.innerHTML += `<button class="action-btn next-lvl-btn" onclick="seviyeDegistir(2)">${UI.nextLvl2}</button>`;
            } else {
                actionWrapper.innerHTML += `<p style="color: var(--accent-color); font-weight: bold; font-size: 14px;">⚠️ ${UI.lvlFail2}</p>`;
            }
        } else if (mevcutSeviye === 2) {
            if (dogruSayisi >= 10) {
                actionWrapper.innerHTML += `<button class="action-btn next-lvl-btn" onclick="seviyeDegistir(3)">${UI.nextLvl3}</button>`;
            } else {
                actionWrapper.innerHTML += `<p style="color: var(--accent-color); font-weight: bold; font-size: 14px;">⚠️ ${UI.lvlFail3}</p>`;
            }
        }

        actionWrapper.innerHTML += `
            <button class="action-btn" onclick="oyunuYenidenBaslat()">${UI.restart}</button>
            <button class="action-btn vibe-btn" onclick="vibeUygulamasinaDon()">${UI.returnVibe}</button>
        `;
        
        optionsBox.appendChild(actionWrapper);
    }

    function seviyeDegistir(hedefLvl) {
        initLevel(hedefLvl);
        soruYukle();
    }

    function oyunuYenidenBaslat() {
        initLevel(1);
        soruYukle();
    }

    function vibeUygulamasinaDon() {
        window.location.href = "vibe://back"; 
    }
</script>
